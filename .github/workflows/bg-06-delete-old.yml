name: "Blue-Green | 6. Delete Old Cluster (Happy Path)"

# Cleanup: permanently deletes the old blue cluster after a successful switchover
# when NO rollback is needed.
#
# Use this when you have confirmed production is stable on the new cluster and
# you no longer need the old blue cluster for rollback.
#
# If you DID roll back (trigger_rollback=true was applied), use bg-03 with
# action=delete-cluster-after-rollback instead — that deletes the -new1 cluster.
#
# SAFETY guards:
#   1. Type DELETE to confirm (irreversible)
#   2. Reads old_blue_cluster_id from Terraform state — no manual input needed
#   3. Verifies the cluster still exists before attempting deletion

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DELETE to confirm — permanently deletes the old blue cluster'
        required: true
        default: ''
      project_name:
        description: 'Must match the project_name used in aurora-deploy (e.g. aurora-github-8a1)'
        required: false
        default: 'aurora-github-8a1'
      aurora_cluster_name:
        description: 'Must match the aurora_cluster_name used in aurora-deploy (e.g. aurora-github-db)'
        required: false
        default: 'aurora-github-db'
      environment:
        description: 'Environment tag — must match the environment used in aurora-deploy'
        required: false
        default: 'aurora-test'
      tf_state_key:
        description: 'S3 state key — must match your environment'
        required: false
        default: 'aurora-github/terraform.tfstate'
      aws_region:
        description: 'AWS Region'
        required: false
        default: 'us-east-1'

env:
  TF_VERSION: "1.9.0"
  GO_VERSION: "1.21"
  PROVIDER_VERSION: "1.0.0"

jobs:
  delete-old:
    name: "Delete Old Blue Cluster"
    runs-on: ubuntu-latest
    environment: aurora-test   # ← approval gate

    steps:
      - name: Confirm intent
        run: |
          if [ "${{ inputs.confirm }}" != "DELETE" ]; then
            echo "ERROR: Type DELETE in the confirm field to proceed."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (AWS + provider build + terraform init)
        uses: ./.github/actions/tf-setup
        with:
          aws_access_key_id:    ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token:    ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region:           ${{ inputs.aws_region }}
          tf_state_bucket:      ${{ secrets.TF_STATE_BUCKET }}
          tf_state_key:         ${{ inputs.tf_state_key }}
          tf_state_lock_table:  ${{ secrets.TF_STATE_LOCK_TABLE }}
          tf_version:           ${{ env.TF_VERSION }}
          go_version:           ${{ env.GO_VERSION }}
          provider_version:     ${{ env.PROVIDER_VERSION }}

      - name: Write variable overrides
        run: |
          cat > /tmp/override.tfvars << EOF
          project_name        = "${{ inputs.project_name }}"
          aurora_cluster_name = "${{ inputs.aurora_cluster_name }}"
          environment         = "${{ inputs.environment }}"
          iam_role_name       = "${{ inputs.project_name }}-readonly-role"
          iam_policy_name     = "${{ inputs.project_name }}-readonly-policy"
          okta_app_name       = "${{ inputs.project_name }}-app"
          okta_group_name     = "${{ inputs.project_name }}-readonly-users"
          EOF

      - name: Read old cluster ID from state
        id: state
        run: |
          OLD_ID=$(terraform output -raw old_blue_cluster_id 2>/dev/null || echo "")
          if [ -z "$OLD_ID" ] || [ "$OLD_ID" = "null" ]; then
            echo "INFO: old_blue_cluster_id is empty — old cluster may already be deleted."
            exit 0
          fi

          # Verify cluster still exists in AWS before attempting deletion.
          STATUS=$(aws rds describe-db-clusters \
            --db-cluster-identifier "$OLD_ID" \
            --query "DBClusters[0].Status" \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$STATUS" = "NOT_FOUND" ] || [ "$STATUS" = "None" ]; then
            echo "INFO: Cluster $OLD_ID not found in AWS — already deleted."
            exit 0
          fi

          echo "old_cluster_id=$OLD_ID" >> $GITHUB_OUTPUT
          echo "Will delete cluster: $OLD_ID (current status: $STATUS)"

      - name: Delete all instances in old cluster
        if: steps.state.outputs.old_cluster_id != ''
        run: |
          OLD_ID="${{ steps.state.outputs.old_cluster_id }}"

          # Get all instance IDs in the cluster.
          INSTANCES=$(aws rds describe-db-instances \
            --filters "Name=db-cluster-id,Values=$OLD_ID" \
            --query "DBInstances[*].DBInstanceIdentifier" \
            --output text 2>/dev/null || echo "")

          if [ -n "$INSTANCES" ]; then
            for INSTANCE_ID in $INSTANCES; do
              echo "Deleting instance: $INSTANCE_ID"
              aws rds delete-db-instance \
                --db-instance-identifier "$INSTANCE_ID" \
                --skip-final-snapshot \
                --region "${{ inputs.aws_region }}" || true
            done

            echo "Waiting for all instances to be deleted..."
            for INSTANCE_ID in $INSTANCES; do
              aws rds wait db-instance-deleted \
                --db-instance-identifier "$INSTANCE_ID" \
                --region "${{ inputs.aws_region }}" || true
              echo "Instance $INSTANCE_ID deleted."
            done
          else
            echo "No instances found in cluster $OLD_ID."
          fi

      - name: Delete old cluster
        if: steps.state.outputs.old_cluster_id != ''
        run: |
          OLD_ID="${{ steps.state.outputs.old_cluster_id }}"
          echo "Deleting cluster: $OLD_ID"
          aws rds delete-db-cluster \
            --db-cluster-identifier "$OLD_ID" \
            --skip-final-snapshot \
            --region "${{ inputs.aws_region }}"
          echo "Cluster $OLD_ID deletion initiated."

      - name: Deletion summary
        run: |
          OLD_ID="${{ steps.state.outputs.old_cluster_id }}"
          {
            echo "## Old Cluster Deletion Initiated"
            echo ""
            echo "| Deleted | \`${OLD_ID:-already gone}\` |"
            echo "|---------|---|"
            echo ""
            echo "### Next Steps"
            echo "- Set \`enable_blue_green = false\` and run **aurora-deploy** to remove the B/G resource from state"
            echo "- Or keep \`enable_blue_green = true\` and run **bg-01-create-green** to start the next upgrade cycle"
          } >> $GITHUB_STEP_SUMMARY
