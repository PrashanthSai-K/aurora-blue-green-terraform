name: "Blue-Green | 6. Delete Old Cluster"

# Phase 6 (cleanup): Permanently deletes the old blue cluster.
#
# All required values are read from Terraform state — no manual inputs needed.
#
# SAFETY guards:
#   1. Type DELETE to confirm (irreversible action)
#   2. Workflow checks proxy is NOT on old cluster before proceeding
#   3. Provider enforces same guard — refuses if proxy_active_cluster = "old"
#
# If you rolled back and want to delete the NEW cluster instead, run bg-05-rollback-new
# first to move traffic back to new, then come back here.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DELETE to confirm — permanently deletes the old cluster'
        required: true
        default: ''
      tf_state_key:
        description: 'S3 state key — must match your environment'
        required: false
        default: 'aurora-okta/terraform.tfstate'
      aws_region:
        description: 'AWS Region'
        required: false
        default: 'us-east-1'

env:
  TF_VERSION: "1.9.0"
  GO_VERSION: "1.21"
  PROVIDER_VERSION: "1.0.0"

jobs:
  delete-old:
    name: "Delete Old Blue Cluster"
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Confirm intent
        run: |
          if [ "${{ inputs.confirm }}" != "DELETE" ]; then
            echo "ERROR: Type DELETE in the confirm field to proceed."
            exit 1
          fi

      - name: Setup (checkout + AWS + provider build + terraform init)
        uses: ./.github/actions/tf-setup
        with:
          aws_access_key_id:    ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token:    ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region:           ${{ inputs.aws_region }}
          tf_state_bucket:      ${{ secrets.TF_STATE_BUCKET }}
          tf_state_key:         ${{ inputs.tf_state_key }}
          tf_state_lock_table:  ${{ secrets.TF_STATE_LOCK_TABLE }}
          tf_version:           ${{ env.TF_VERSION }}
          go_version:           ${{ env.GO_VERSION }}
          provider_version:     ${{ env.PROVIDER_VERSION }}

      - name: Read required values from state
        id: state
        run: |
          CURRENT_PROXY=$(terraform output -raw proxy_active_cluster 2>/dev/null || echo "new")
          OLD_ID=$(terraform output -raw old_blue_cluster_id 2>/dev/null || echo "")
          BASTION=$(terraform output -raw bastion_instance_id 2>/dev/null || echo "")

          if [ "$CURRENT_PROXY" = "old" ]; then
            echo "ERROR: Cannot delete old cluster — proxy is routing traffic to it."
            echo "Run bg-05-rollback-new first."
            exit 1
          fi
          if [ -z "$OLD_ID" ] || [ "$OLD_ID" = "null" ]; then
            echo "INFO: old_blue_cluster_id is empty — old cluster may already be gone."
            exit 0
          fi

          echo "old_cluster_id=$OLD_ID" >> $GITHUB_OUTPUT
          echo "bastion_id=$BASTION"    >> $GITHUB_OUTPUT
          echo "Will delete: $OLD_ID (proxy is on: $CURRENT_PROXY)"

      - name: Terraform Plan — Delete Old Cluster
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -var="enable_blue_green=true" \
            -var="trigger_switchover=true" \
            -var="delete_old_cluster=true" \
            -var="old_blue_cluster_id=${{ steps.state.outputs.old_cluster_id }}" \
            -var="bastion_instance_id=${{ steps.state.outputs.bastion_id }}" \
            -out=tfplan \
            2>&1 | tee /tmp/plan-output.txt
        env:
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

      - name: Plan Summary
        run: |
          {
            echo "## Plan — Delete Old Cluster"
            echo "**Target:** \`${{ steps.state.outputs.old_cluster_id }}\`"
            echo '```'
            tail -30 /tmp/plan-output.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply — Delete Old Cluster
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

      - name: Deletion Summary
        run: |
          {
            echo "## Old Cluster Deleted"
            echo ""
            echo "| Deleted | \`${{ steps.state.outputs.old_cluster_id }}\` |"
            echo "|---------|---|"
            echo ""
            echo "### Next Steps"
            echo "- Set \`enable_blue_green = false\` and run **aurora-deploy** to remove the B/G deployment object"
            echo "- Or keep \`enable_blue_green = true\` and run **bg-01-create-green** for the next upgrade cycle"
          } >> $GITHUB_STEP_SUMMARY
