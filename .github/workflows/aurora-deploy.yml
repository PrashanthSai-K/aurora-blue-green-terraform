name: "Aurora | Deploy from Scratch"

# Deploys the full Aurora stack (VPC, Aurora, RDS Proxy, Okta, IAM) from zero.
# Change project_name + tf_state_key to spin up a completely isolated test environment.
# Blue/Green variables are forced OFF — use the bg-* workflows for B/G operations.
#
# Flow:
#   1. plan job  — always runs, posts plan to job summary, uploads tfplan artifact
#   2. apply job — waits for manual approval (environment protection rule on aurora-test),
#                  then downloads the saved plan and applies it
#
# One-time setup: Settings → Environments → aurora-test → Required reviewers → add yourself
#
# Secrets required (repo or environment level):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN (if using temp creds)
#   TF_STATE_BUCKET, TF_STATE_LOCK_TABLE, OKTA_API_TOKEN

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'plan = preview only | apply = deploy | destroy = tear down'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply, destroy]

      tf_state_key:
        description: 'S3 state key — unique path per environment (e.g. aurora-test-1/terraform.tfstate)'
        required: false
        default: 'aurora-github/terraform.tfstate'

      project_name:
        description: 'Project prefix for all AWS/Okta resource names (e.g. aurora-github-8a1)'
        required: false
        default: 'aurora-github-8a1'
      environment:
        description: 'Environment tag'
        required: false
        default: 'aurora-test'
      aws_region:
        description: 'AWS Region'
        required: false
        default: 'us-east-1'

      aurora_cluster_name:
        description: 'Aurora cluster identifier'
        required: false
        default: 'aurora-github-db'
      aurora_engine_version:
        description: 'Aurora MySQL engine version'
        required: false
        default: '8.0.mysql_aurora.3.10.3'
      aurora_instance_class:
        description: 'DB instance class'
        required: false
        default: 'db.t3.medium'

      okta_org_name:
        description: 'Okta org subdomain (blank = use value in terraform.tfvars)'
        required: false
        default: ''

      bastion_key_pair:
        description: 'EC2 key pair for bastion SSH access'
        required: false
        default: 'linux-key'
      local_ip_cidr:
        description: 'Your IP in CIDR for bastion access (testing only)'
        required: false
        default: '0.0.0.0/0'

env:
  TF_VERSION: "1.9.0"
  GO_VERSION: "1.21"
  PROVIDER_VERSION: "1.0.0"

# ── Job 1: Plan ───────────────────────────────────────────────────────────────
jobs:
  plan:
    name: "Plan [${{ inputs.action }}] — ${{ inputs.project_name }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (AWS + provider build + terraform init)
        uses: ./.github/actions/tf-setup
        with:
          aws_access_key_id:    ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token:    ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region:           ${{ inputs.aws_region }}
          tf_state_bucket:      ${{ secrets.TF_STATE_BUCKET }}
          tf_state_key:         ${{ inputs.tf_state_key }}
          tf_state_lock_table:  ${{ secrets.TF_STATE_LOCK_TABLE }}
          tf_version:           ${{ env.TF_VERSION }}
          go_version:           ${{ env.GO_VERSION }}
          provider_version:     ${{ env.PROVIDER_VERSION }}

      - name: Write variable overrides
        run: |
          cat > /tmp/override.tfvars << EOF
          project_name          = "${{ inputs.project_name }}"
          environment           = "${{ inputs.environment }}"
          aws_region            = "${{ inputs.aws_region }}"
          aurora_cluster_name   = "${{ inputs.aurora_cluster_name }}"
          aurora_engine_version = "${{ inputs.aurora_engine_version }}"
          aurora_instance_class = "${{ inputs.aurora_instance_class }}"
          bastion_key_pair      = "${{ inputs.bastion_key_pair }}"
          local_ip_cidr         = "${{ inputs.local_ip_cidr }}"
          rds_proxy_name        = "${{ inputs.project_name }}-proxy"
          iam_role_name         = "${{ inputs.project_name }}-readonly-role"
          iam_policy_name       = "${{ inputs.project_name }}-readonly-policy"
          okta_app_name         = "${{ inputs.project_name }}-app"
          okta_group_name       = "${{ inputs.project_name }}-readonly-users"
          enable_blue_green     = false
          trigger_switchover    = false
          EOF

          if [ -n "${{ inputs.okta_org_name }}" ]; then
            echo "okta_org_name = \"${{ inputs.okta_org_name }}\"" >> /tmp/override.tfvars
          fi

      - name: Terraform Plan
        run: |
          DESTROY_FLAG=""
          [ "${{ inputs.action }}" = "destroy" ] && DESTROY_FLAG="-destroy"

          terraform plan \
            -var-file="terraform.tfvars" \
            -var-file="/tmp/override.tfvars" \
            $DESTROY_FLAG \
            -out=tfplan \
            2>&1 | tee /tmp/plan-output.txt
        env:
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

      - name: Plan Summary
        run: |
          {
            echo "## Terraform Plan — \`${{ inputs.action }}\`"
            echo "**Project:** \`${{ inputs.project_name }}\`  |  **State:** \`${{ inputs.tf_state_key }}\`"
            echo ""
            echo '```'
            tail -60 /tmp/plan-output.txt
            echo '```'
            if [ "${{ inputs.action }}" != "plan" ]; then
              echo ""
              echo "> Approve the **apply** job below to execute this plan."
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload plan artifact
        if: inputs.action == 'apply' || inputs.action == 'destroy'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

# ── Job 2: Apply (requires approval) ─────────────────────────────────────────
  apply:
    name: "Apply [${{ inputs.action }}] — ${{ inputs.project_name }}"
    needs: plan
    if: inputs.action == 'apply' || inputs.action == 'destroy'
    runs-on: ubuntu-latest
    environment: aurora-test   # ← approval gate: Settings → Environments → aurora-test → Required reviewers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (AWS + provider build + terraform init)
        uses: ./.github/actions/tf-setup
        with:
          aws_access_key_id:    ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token:    ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region:           ${{ inputs.aws_region }}
          tf_state_bucket:      ${{ secrets.TF_STATE_BUCKET }}
          tf_state_key:         ${{ inputs.tf_state_key }}
          tf_state_lock_table:  ${{ secrets.TF_STATE_LOCK_TABLE }}
          tf_version:           ${{ env.TF_VERSION }}
          go_version:           ${{ env.GO_VERSION }}
          provider_version:     ${{ env.PROVIDER_VERSION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply / Destroy
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

      - name: Deployment Outputs
        if: inputs.action == 'apply'
        run: |
          CLUSTER_ID=$(terraform output -raw aurora_cluster_id 2>/dev/null || echo "N/A")
          CLUSTER_EP=$(terraform output -raw aurora_cluster_endpoint 2>/dev/null || echo "N/A")
          PROXY_EP=$(terraform output -raw rds_proxy_endpoint 2>/dev/null || echo "N/A")
          ACCOUNT_ID=$(terraform output -raw aws_account_id 2>/dev/null || echo "N/A")

          {
            echo "## Aurora Deployed Successfully"
            echo ""
            echo "| Resource | Value |"
            echo "|----------|-------|"
            echo "| Project | \`${{ inputs.project_name }}\` |"
            echo "| AWS Account | \`$ACCOUNT_ID\` |"
            echo "| Aurora Cluster | \`$CLUSTER_ID\` |"
            echo "| Writer Endpoint | \`$CLUSTER_EP\` |"
            echo "| RDS Proxy Endpoint | \`$PROXY_EP\` |"
            echo "| State Key | \`${{ inputs.tf_state_key }}\` |"
            echo ""
            echo "### Next Steps"
            echo "1. Test connectivity via bastion"
            echo "2. When ready to upgrade, run **bg-01-create-green** with the same \`tf_state_key\`"
          } >> $GITHUB_STEP_SUMMARY
