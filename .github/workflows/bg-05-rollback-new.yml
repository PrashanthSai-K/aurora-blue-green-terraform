name: "Blue-Green | 5. Re-promote → New Cluster"

# Phase 5: Flips the RDS Proxy back to the new cluster after a rollback.
#
# All required values (old_blue_cluster_id, bastion_instance_id) are read directly
# from Terraform state — no manual inputs needed beyond the state key.
#
# Prerequisite: bg-04-rollback-old must have run (proxy currently on old).

on:
  workflow_dispatch:
    inputs:
      tf_state_key:
        description: 'S3 state key — must match your environment'
        required: false
        default: 'aurora-okta/terraform.tfstate'
      aws_region:
        description: 'AWS Region'
        required: false
        default: 'us-east-1'

env:
  TF_VERSION: "1.9.0"
  GO_VERSION: "1.21"
  PROVIDER_VERSION: "1.0.0"

jobs:
  rollback-new:
    name: "Re-promote — Proxy → New Cluster"
    runs-on: ubuntu-latest
    environment: aurora-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (AWS + provider build + terraform init)
        uses: ./.github/actions/tf-setup
        with:
          aws_access_key_id:    ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token:    ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region:           ${{ inputs.aws_region }}
          tf_state_bucket:      ${{ secrets.TF_STATE_BUCKET }}
          tf_state_key:         ${{ inputs.tf_state_key }}
          tf_state_lock_table:  ${{ secrets.TF_STATE_LOCK_TABLE }}
          tf_version:           ${{ env.TF_VERSION }}
          go_version:           ${{ env.GO_VERSION }}
          provider_version:     ${{ env.PROVIDER_VERSION }}

      - name: Read required values from state
        id: state
        run: |
          OLD_ID=$(terraform output -raw old_blue_cluster_id 2>/dev/null || echo "")
          BASTION=$(terraform output -raw bastion_instance_id 2>/dev/null || echo "")
          CURRENT_PROXY=$(terraform output -raw proxy_active_cluster 2>/dev/null || echo "unknown")

          if [ -z "$OLD_ID" ] || [ "$OLD_ID" = "null" ]; then
            echo "ERROR: old_blue_cluster_id not in state — run bg-02-switchover first."
            exit 1
          fi
          if [ "$CURRENT_PROXY" = "new" ]; then
            echo "Proxy is already on new cluster — nothing to do."
            exit 0
          fi

          echo "old_cluster_id=$OLD_ID" >> $GITHUB_OUTPUT
          echo "bastion_id=$BASTION"    >> $GITHUB_OUTPUT
          echo "Old cluster : $OLD_ID"
          echo "Bastion     : $BASTION"
          echo "Proxy now   : $CURRENT_PROXY → flipping back to new"

      - name: Terraform Plan — Re-promote New
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -var="enable_blue_green=true" \
            -var="trigger_switchover=true" \
            -var="proxy_active_cluster=new" \
            -var="old_blue_cluster_id=${{ steps.state.outputs.old_cluster_id }}" \
            -var="bastion_instance_id=${{ steps.state.outputs.bastion_id }}" \
            -out=tfplan \
            2>&1 | tee /tmp/plan-output.txt
        env:
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

      - name: Plan Summary
        run: |
          {
            echo "## Plan — Re-promote New Cluster"
            echo '```'
            tail -30 /tmp/plan-output.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply — Re-promote
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

      - name: Re-promote Summary
        run: |
          PROXY_NOW=$(terraform output -raw proxy_active_cluster 2>/dev/null || echo "new")
          CLUSTER_EP=$(terraform output -raw aurora_cluster_endpoint 2>/dev/null || echo "N/A")
          {
            echo "## Re-promote Complete — Traffic on New Cluster"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Proxy Target | \`$PROXY_NOW\` |"
            echo "| Writer Endpoint | \`$CLUSTER_EP\` |"
            echo ""
            echo "### Next Steps"
            echo "- Run **bg-06-delete-old** when ready to permanently remove the old cluster"
          } >> $GITHUB_STEP_SUMMARY
