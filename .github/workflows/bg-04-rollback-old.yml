name: "Blue-Green | 4. Rollback → Old Cluster"

# Phase 4 (emergency rollback): Flips the RDS Proxy to route traffic to the old cluster.
#
# All required values (old_blue_cluster_id, bastion_instance_id) are read directly
# from Terraform state — no manual inputs needed beyond the state key.
#
# Zero-data-loss sequence is enforced automatically by Terraform:
#   null_resource.pre_proxy_flip  → set new prod read-only, wait replication lag = 0
#   aurora-bluegreen provider     → flip proxy target to old cluster
#   null_resource.post_proxy_flip → promote old cluster to read-write
#
# Prerequisite: bg-02-switchover must have completed.

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Must match the project_name used in aurora-deploy (e.g. aurora-github-8a1)'
        required: false
        default: 'aurora-github-8a1'
      aurora_cluster_name:
        description: 'Must match the aurora_cluster_name used in aurora-deploy (e.g. aurora-github-db)'
        required: false
        default: 'aurora-github-db'
      environment:
        description: 'Environment tag — must match the environment used in aurora-deploy'
        required: false
        default: 'aurora-test'
      tf_state_key:
        description: 'S3 state key — must match your environment'
        required: false
        default: 'aurora-github/terraform.tfstate'
      aws_region:
        description: 'AWS Region'
        required: false
        default: 'us-east-1'

env:
  TF_VERSION: "1.9.0"
  GO_VERSION: "1.21"
  PROVIDER_VERSION: "1.0.0"

jobs:
  rollback-old:
    name: "Rollback — Proxy → Old Cluster"
    runs-on: ubuntu-latest
    environment: aurora-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (AWS + provider build + terraform init)
        uses: ./.github/actions/tf-setup
        with:
          aws_access_key_id:    ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token:    ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region:           ${{ inputs.aws_region }}
          tf_state_bucket:      ${{ secrets.TF_STATE_BUCKET }}
          tf_state_key:         ${{ inputs.tf_state_key }}
          tf_state_lock_table:  ${{ secrets.TF_STATE_LOCK_TABLE }}
          tf_version:           ${{ env.TF_VERSION }}
          go_version:           ${{ env.GO_VERSION }}
          provider_version:     ${{ env.PROVIDER_VERSION }}

      - name: Write variable overrides
        run: |
          # Must match the values used in aurora-deploy for this environment.
          cat > /tmp/override.tfvars << EOF
          project_name        = "${{ inputs.project_name }}"
          aurora_cluster_name = "${{ inputs.aurora_cluster_name }}"
          environment         = "${{ inputs.environment }}"
          rds_proxy_name      = "${{ inputs.project_name }}-proxy"
          iam_role_name       = "${{ inputs.project_name }}-readonly-role"
          iam_policy_name     = "${{ inputs.project_name }}-readonly-policy"
          okta_app_name       = "${{ inputs.project_name }}-app"
          okta_group_name     = "${{ inputs.project_name }}-readonly-users"
          EOF

      - name: Read required values from state
        id: state
        run: |
          OLD_ID=$(terraform output -raw old_blue_cluster_id 2>/dev/null || echo "")
          BASTION=$(terraform output -raw bastion_instance_id 2>/dev/null || echo "")
          CURRENT_PROXY=$(terraform output -raw proxy_active_cluster 2>/dev/null || echo "new")

          if [ -z "$OLD_ID" ] || [ "$OLD_ID" = "null" ]; then
            echo "ERROR: old_blue_cluster_id not in state — run bg-02-switchover first."
            exit 1
          fi
          if [ "$CURRENT_PROXY" = "old" ]; then
            echo "Proxy is already on old cluster — nothing to do."
            exit 0
          fi

          echo "old_cluster_id=$OLD_ID"      >> $GITHUB_OUTPUT
          echo "bastion_id=$BASTION"          >> $GITHUB_OUTPUT
          echo "Old cluster : $OLD_ID"
          echo "Bastion     : $BASTION"
          echo "Proxy now   : $CURRENT_PROXY → flipping to old"

      - name: Terraform Plan — Rollback to Old
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -var-file="/tmp/override.tfvars" \
            -var="enable_blue_green=true" \
            -var="trigger_switchover=true" \
            -var="proxy_active_cluster=old" \
            -var="old_blue_cluster_id=${{ steps.state.outputs.old_cluster_id }}" \
            -var="bastion_instance_id=${{ steps.state.outputs.bastion_id }}" \
            -out=tfplan \
            2>&1 | tee /tmp/plan-output.txt
        env:
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

      - name: Plan Summary
        run: |
          {
            echo "## Plan — Rollback to Old Cluster"
            echo "**Target:** \`${{ steps.state.outputs.old_cluster_id }}\`"
            echo '```'
            tail -30 /tmp/plan-output.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply — Rollback
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

      - name: Rollback Summary
        run: |
          PROXY_NOW=$(terraform output -raw proxy_active_cluster 2>/dev/null || echo "old")
          {
            echo "## Rollback Complete — Traffic on Old Cluster"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Old Cluster | \`${{ steps.state.outputs.old_cluster_id }}\` |"
            echo "| Proxy Target | \`$PROXY_NOW\` |"
            echo ""
            echo "### Next Steps"
            echo "- Fix the issue on new cluster, then run **bg-05-rollback-new** to promote it back"
          } >> $GITHUB_STEP_SUMMARY
