name: "Blue-Green | 2. Switchover"

# Phase 2: Promotes green to production.
# The aurora-bluegreen provider calls SwitchoverBlueGreenDeployment, polls until
# SWITCHOVER_COMPLETED, and writes old_blue_cluster_id to state.
#
# After apply, old_blue_cluster_id and bastion_instance_id are in Terraform state.
# All rollback workflows read them directly — no manual IDs needed.

on:
  workflow_dispatch:
    inputs:
      bastion_instance_id:
        description: 'Bastion EC2 instance ID (e.g. i-0abc123) — stored in state after this run'
        required: true
      green_engine_version:
        description: 'Engine version used in Phase 1 (must match bg-01-create-green)'
        required: false
        default: ''
      project_name:
        description: 'Must match the project_name used in aurora-deploy (e.g. aurora-github-8a1)'
        required: false
        default: 'aurora-github-8a1'
      aurora_cluster_name:
        description: 'Must match the aurora_cluster_name used in aurora-deploy (e.g. aurora-github-db)'
        required: false
        default: 'aurora-github-db'
      tf_state_key:
        description: 'S3 state key — must match your environment'
        required: false
        default: 'aurora-github/terraform.tfstate'
      aws_region:
        description: 'AWS Region'
        required: false
        default: 'us-east-1'

env:
  TF_VERSION: "1.9.0"
  GO_VERSION: "1.21"
  PROVIDER_VERSION: "1.0.0"

jobs:
  switchover:
    name: "Switchover Blue → Green"
    runs-on: ubuntu-latest
    environment: aurora-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (AWS + provider build + terraform init)
        uses: ./.github/actions/tf-setup
        with:
          aws_access_key_id:    ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token:    ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region:           ${{ inputs.aws_region }}
          tf_state_bucket:      ${{ secrets.TF_STATE_BUCKET }}
          tf_state_key:         ${{ inputs.tf_state_key }}
          tf_state_lock_table:  ${{ secrets.TF_STATE_LOCK_TABLE }}
          tf_version:           ${{ env.TF_VERSION }}
          go_version:           ${{ env.GO_VERSION }}
          provider_version:     ${{ env.PROVIDER_VERSION }}

      - name: Write variable overrides
        run: |
          # Must match the values used in aurora-deploy for this environment.
          cat > /tmp/override.tfvars << EOF
          project_name        = "${{ inputs.project_name }}"
          aurora_cluster_name = "${{ inputs.aurora_cluster_name }}"
          rds_proxy_name      = "${{ inputs.project_name }}-proxy"
          iam_role_name       = "${{ inputs.project_name }}-readonly-role"
          iam_policy_name     = "${{ inputs.project_name }}-readonly-policy"
          okta_app_name       = "${{ inputs.project_name }}-app"
          okta_group_name     = "${{ inputs.project_name }}-readonly-users"
          EOF

      - name: Pre-flight — verify green is AVAILABLE
        run: |
          STATUS=$(terraform output -raw blue_green_status 2>/dev/null || echo "UNKNOWN")
          BG_ID=$(terraform output -raw blue_green_deployment_id 2>/dev/null || echo "UNKNOWN")
          echo "Deployment : $BG_ID"
          echo "Status     : $STATUS"
          if [ "$STATUS" != "AVAILABLE" ]; then
            echo "ERROR: Green must be AVAILABLE before switchover (current: $STATUS)."
            echo "Run bg-01-create-green first and wait for it to complete."
            exit 1
          fi

      - name: Terraform Plan — Switchover
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -var-file="/tmp/override.tfvars" \
            -var="enable_blue_green=true" \
            -var="trigger_switchover=true" \
            -var="green_engine_version=${{ inputs.green_engine_version }}" \
            -var="bastion_instance_id=${{ inputs.bastion_instance_id }}" \
            -var="retain_old_cluster=true" \
            -out=tfplan \
            2>&1 | tee /tmp/plan-output.txt
        env:
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

      - name: Plan Summary
        run: |
          {
            echo "## Plan — Switchover"
            echo '```'
            tail -30 /tmp/plan-output.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply — Switchover
        run: terraform apply -auto-approve tfplan
        # Provider calls SwitchoverBlueGreenDeployment, polls until SWITCHOVER_COMPLETED.
        # old_blue_cluster_id and bastion_instance_id are written to state on completion.
        env:
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

      - name: Verify New Cluster Health
        run: |
          CLUSTER_ID=$(terraform output -raw aurora_cluster_id 2>/dev/null || echo "aurora-readonly-db")
          STATUS=$(aws rds describe-db-clusters \
            --db-cluster-identifier "$CLUSTER_ID" \
            --query "DBClusters[0].Status" --output text 2>/dev/null || echo "UNKNOWN")
          ENDPOINT=$(aws rds describe-db-clusters \
            --db-cluster-identifier "$CLUSTER_ID" \
            --query "DBClusters[0].Endpoint" --output text 2>/dev/null || echo "N/A")
          echo "Cluster status  : $STATUS"
          echo "Writer endpoint : $ENDPOINT"

      - name: Switchover Summary
        run: |
          OLD_CLUSTER=$(terraform output -raw old_blue_cluster_id 2>/dev/null || echo "N/A")
          {
            echo "## Switchover Complete"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Old Blue Cluster | \`$OLD_CLUSTER\` |"
            echo "| Bastion | \`${{ inputs.bastion_instance_id }}\` |"
            echo ""
            echo "Both values are now in Terraform state — rollback workflows read them automatically."
            echo ""
            echo "### Next Options"
            echo "- **Rollback needed?** → Run **bg-04-rollback-old** (no inputs needed)"
            echo "- **Enable replication?** → Run **bg-03-enable-replication** (no inputs needed)"
            echo "- **Everything stable?** → Run **bg-06-delete-old** to clean up"
          } >> $GITHUB_STEP_SUMMARY
