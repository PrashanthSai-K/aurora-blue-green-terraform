name: "Blue-Green | 3. Enable Reverse Replication"

# Phase 3 (optional safety net): Sets up binlog replication from new production
# back to the old blue cluster so a proxy rollback incurs zero data loss.
#
# All required values (old_blue_cluster_id, bastion_instance_id) are read directly
# from Terraform state — no manual inputs needed.
#
# Prerequisite: bg-02-switchover must have completed.

on:
  workflow_dispatch:
    inputs:
      tf_state_key:
        description: 'S3 state key — must match your environment'
        required: false
        default: 'aurora-okta/terraform.tfstate'
      aws_region:
        description: 'AWS Region'
        required: false
        default: 'us-east-1'

env:
  TF_VERSION: "1.9.0"
  GO_VERSION: "1.21"
  PROVIDER_VERSION: "1.0.0"

jobs:
  enable-replication:
    name: "Enable Reverse Replication (new → old)"
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (AWS + provider build + terraform init)
        uses: ./.github/actions/tf-setup
        with:
          aws_access_key_id:    ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token:    ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region:           ${{ inputs.aws_region }}
          tf_state_bucket:      ${{ secrets.TF_STATE_BUCKET }}
          tf_state_key:         ${{ inputs.tf_state_key }}
          tf_state_lock_table:  ${{ secrets.TF_STATE_LOCK_TABLE }}
          tf_version:           ${{ env.TF_VERSION }}
          go_version:           ${{ env.GO_VERSION }}
          provider_version:     ${{ env.PROVIDER_VERSION }}

      - name: Read required values from state
        id: state
        run: |
          STATUS=$(terraform output -raw blue_green_status 2>/dev/null || echo "UNKNOWN")
          if [ "$STATUS" != "SWITCHOVER_COMPLETED" ]; then
            echo "ERROR: Switchover must complete first (status: $STATUS)"
            exit 1
          fi

          OLD_ID=$(terraform output -raw old_blue_cluster_id 2>/dev/null || echo "")
          BASTION=$(terraform output -raw bastion_instance_id 2>/dev/null || echo "")

          if [ -z "$OLD_ID" ] || [ "$OLD_ID" = "null" ]; then
            echo "ERROR: old_blue_cluster_id not in state — run bg-02-switchover first."
            exit 1
          fi

          echo "old_cluster_id=$OLD_ID" >> $GITHUB_OUTPUT
          echo "bastion_id=$BASTION"    >> $GITHUB_OUTPUT
          echo "Old cluster : $OLD_ID"
          echo "Bastion     : $BASTION"

      - name: Terraform Plan — Enable Replication
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -var="enable_blue_green=true" \
            -var="trigger_switchover=true" \
            -var="enable_reverse_replication=true" \
            -var="old_blue_cluster_id=${{ steps.state.outputs.old_cluster_id }}" \
            -var="bastion_instance_id=${{ steps.state.outputs.bastion_id }}" \
            -out=tfplan \
            2>&1 | tee /tmp/plan-output.txt
        env:
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

      - name: Plan Summary
        run: |
          {
            echo "## Plan — Enable Reverse Replication"
            echo '```'
            tail -30 /tmp/plan-output.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply — Enable Replication
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

      - name: Replication Status
        run: |
          REP_STATUS=$(terraform output -raw replication_status 2>/dev/null || echo "N/A")
          {
            echo "## Reverse Replication Enabled"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Replication Status | \`$REP_STATUS\` |"
            echo ""
            echo "Old blue is now kept in sync with new production."
            echo "Proxy rollback via **bg-04-rollback-old** will incur zero data loss."
          } >> $GITHUB_STEP_SUMMARY
