name: "Blue-Green | 3. Replication & Rollback"

# Three actions in one workflow:
#
#   enable-replication
#     Sets up MySQL replication: new prod → old blue.
#     Provides rollback safety — old blue stays in sync so a rollback has zero data loss.
#     No Terraform apply, no approval gate.
#
#   rollback
#     Performs a name-swap rollback:
#       pre-flight  — set new prod read-only, wait for replication lag = 0 on old cluster
#       apply       — terraform apply trigger_rollback=true (provider renames clusters)
#       post-swap   — promote old cluster (now at original name) to read-write
#     After rollback the original endpoint is restored (~2-3 min downtime during rename window).
#
#   delete-cluster-after-rollback
#     Permanently deletes the <orig>-new1 cluster left over after rollback.
#     Requires rollback to have completed first.

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'enable-replication | rollback | delete-cluster-after-rollback'
        required: true
        default: 'enable-replication'
        type: choice
        options: [enable-replication, rollback, delete-cluster-after-rollback]
      project_name:
        description: 'Must match the project_name used in aurora-deploy (e.g. aurora-github-8a1)'
        required: false
        default: 'aurora-github-8a1'
      aurora_cluster_name:
        description: 'Must match the aurora_cluster_name used in aurora-deploy (e.g. aurora-github-db)'
        required: false
        default: 'aurora-github-db'
      environment:
        description: 'Environment tag — must match the environment used in aurora-deploy'
        required: false
        default: 'aurora-test'
      tf_state_key:
        description: 'S3 state key — must match your environment'
        required: false
        default: 'aurora-github/terraform.tfstate'
      aws_region:
        description: 'AWS Region'
        required: false
        default: 'us-east-1'

env:
  TF_VERSION: "1.9.0"
  GO_VERSION: "1.21"
  PROVIDER_VERSION: "1.0.0"

# ── Job 1: Plan / Pre-flight ──────────────────────────────────────────────────
# Always runs without approval.
# enable-replication: reads state, runs replication setup — done.
# rollback: pre-flight MySQL check (lag=0), then terraform plan.
# delete-cluster-after-rollback: reads state, shows plan.
jobs:
  plan:
    name: "Plan / Pre-flight (${{ inputs.action }})"
    runs-on: ubuntu-latest
    outputs:
      old_cluster_id: ${{ steps.state.outputs.old_cluster_id }}
      bastion_id:     ${{ steps.state.outputs.bastion_id }}
      db_secret_arn:  ${{ steps.state.outputs.db_secret_arn }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (AWS + provider build + terraform init)
        uses: ./.github/actions/tf-setup
        with:
          aws_access_key_id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region:            ${{ inputs.aws_region }}
          tf_state_bucket:       ${{ secrets.TF_STATE_BUCKET }}
          tf_state_key:          ${{ inputs.tf_state_key }}
          tf_state_lock_table:   ${{ secrets.TF_STATE_LOCK_TABLE }}
          tf_version:            ${{ env.TF_VERSION }}
          go_version:            ${{ env.GO_VERSION }}
          provider_version:      ${{ env.PROVIDER_VERSION }}

      - name: Write variable overrides
        run: |
          cat > /tmp/override.tfvars << EOF
          project_name        = "${{ inputs.project_name }}"
          aurora_cluster_name = "${{ inputs.aurora_cluster_name }}"
          environment         = "${{ inputs.environment }}"
          iam_role_name       = "${{ inputs.project_name }}-readonly-role"
          iam_policy_name     = "${{ inputs.project_name }}-readonly-policy"
          okta_app_name       = "${{ inputs.project_name }}-app"
          okta_group_name     = "${{ inputs.project_name }}-readonly-users"
          EOF

      - name: Read state
        id: state
        run: |
          OLD_ID=$(terraform output -raw old_blue_cluster_id 2>/dev/null || echo "")
          BASTION=$(terraform output -raw bastion_instance_id 2>/dev/null || echo "")

          if [ -z "$OLD_ID" ] || [ "$OLD_ID" = "null" ]; then
            echo "ERROR: old_blue_cluster_id not in state — run bg-02-switchover first."
            exit 1
          fi

          # db_secret_arn may not be in state yet. Look up directly via AWS CLI.
          DB_SECRET=$(aws secretsmanager list-secrets \
            --region "${{ inputs.aws_region }}" \
            --filters "Key=name,Values=${{ inputs.project_name }}-aurora-credentialss" \
            --query 'SecretList[0].ARN' \
            --output text 2>/dev/null || echo "")
          [ -z "$DB_SECRET" ] || [ "$DB_SECRET" = "None" ] && \
            DB_SECRET=$(terraform output -raw db_secret_arn 2>/dev/null || echo "")

          if [ -z "$DB_SECRET" ] || [ "$DB_SECRET" = "None" ]; then
            echo "ERROR: Could not resolve Secrets Manager ARN for ${{ inputs.project_name }}-aurora-credentialss"
            exit 1
          fi

          echo "old_cluster_id=$OLD_ID" >> $GITHUB_OUTPUT
          echo "bastion_id=$BASTION"    >> $GITHUB_OUTPUT
          echo "db_secret_arn=$DB_SECRET" >> $GITHUB_OUTPUT
          echo "Old cluster  : $OLD_ID"
          echo "Bastion      : $BASTION"
          echo "Secret ARN   : $DB_SECRET"

      # ── enable-replication path ───────────────────────────────────────────
      - name: Enable replication — new prod → old blue
        if: inputs.action == 'enable-replication'
        run: bash scripts/enable_replication.sh
        env:
          PROXY_ACTIVE:          new
          OLD_CLUSTER_ID:        ${{ steps.state.outputs.old_cluster_id }}
          NEW_CLUSTER_ID:        ${{ inputs.aurora_cluster_name }}
          AWS_REGION:            ${{ inputs.aws_region }}
          DB_SECRET_NAME:        ${{ steps.state.outputs.db_secret_arn }}
          BASTION_INSTANCE_ID:   ${{ steps.state.outputs.bastion_id }}

      - name: Replication summary
        if: inputs.action == 'enable-replication'
        run: |
          {
            echo "## Replication Enabled — new prod → old blue"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| New prod (source) | \`${{ inputs.aurora_cluster_name }}\` |"
            echo "| Old blue (replica) | \`${{ steps.state.outputs.old_cluster_id }}\` |"
            echo ""
            echo "Old blue is now in sync. Rollback will have zero data loss when replication lag reaches 0."
          } >> $GITHUB_STEP_SUMMARY

      # ── rollback pre-flight path ──────────────────────────────────────────
      - name: Rollback pre-flight — set new prod read-only, wait for lag = 0
        if: inputs.action == 'rollback'
        run: bash scripts/pre_proxy_flip.sh
        # PROXY_ACTIVE=old means we are about to switch to the old cluster.
        # The script sets the current active cluster (new prod) read-only and
        # polls until the old blue cluster's replication lag reaches 0.
        env:
          PROXY_ACTIVE:          old
          OLD_CLUSTER_ID:        ${{ steps.state.outputs.old_cluster_id }}
          NEW_CLUSTER_ID:        ${{ inputs.aurora_cluster_name }}
          AWS_REGION:            ${{ inputs.aws_region }}
          DB_SECRET_NAME:        ${{ steps.state.outputs.db_secret_arn }}
          BASTION_INSTANCE_ID:   ${{ steps.state.outputs.bastion_id }}

      - name: Terraform plan — name-swap rollback
        if: inputs.action == 'rollback'
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -var-file="/tmp/override.tfvars" \
            -var="enable_blue_green=true" \
            -var="trigger_switchover=true" \
            -var="trigger_rollback=true" \
            -var="bastion_instance_id=${{ steps.state.outputs.bastion_id }}" \
            -out=tfplan \
            2>&1 | tee /tmp/plan-output.txt
        env:
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

      # ── delete-cluster-after-rollback plan path ───────────────────────────
      - name: Terraform plan — delete -new1 cluster after rollback
        if: inputs.action == 'delete-cluster-after-rollback'
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -var-file="/tmp/override.tfvars" \
            -var="enable_blue_green=true" \
            -var="trigger_switchover=true" \
            -var="trigger_rollback=true" \
            -var="delete_cluster_after_rollback=true" \
            -var="bastion_instance_id=${{ steps.state.outputs.bastion_id }}" \
            -out=tfplan \
            2>&1 | tee /tmp/plan-output.txt
        env:
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

      - name: Plan summary
        if: inputs.action == 'rollback' || inputs.action == 'delete-cluster-after-rollback'
        run: |
          if [ "${{ inputs.action }}" = "rollback" ]; then
            LABEL="Rollback — name-swap to restore original endpoint"
          else
            LABEL="Delete -new1 cluster after rollback"
          fi
          {
            echo "## Plan — $LABEL"
            echo "**Old cluster:** \`${{ steps.state.outputs.old_cluster_id }}\`"
            echo '```'
            tail -30 /tmp/plan-output.txt
            echo '```'
            echo "> Approve the **apply** job below to execute."
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload plan artifact
        if: inputs.action == 'rollback' || inputs.action == 'delete-cluster-after-rollback'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-bg03-${{ inputs.action }}
          path: tfplan
          retention-days: 1

# ── Job 2: Apply (rollback / delete-cluster-after-rollback — requires approval) ─
  apply:
    name: "Apply — ${{ inputs.action }}"
    needs: plan
    if: inputs.action == 'rollback' || inputs.action == 'delete-cluster-after-rollback'
    runs-on: ubuntu-latest
    environment: aurora-test   # ← approval gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (AWS + provider build + terraform init)
        uses: ./.github/actions/tf-setup
        with:
          aws_access_key_id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region:            ${{ inputs.aws_region }}
          tf_state_bucket:       ${{ secrets.TF_STATE_BUCKET }}
          tf_state_key:          ${{ inputs.tf_state_key }}
          tf_state_lock_table:   ${{ secrets.TF_STATE_LOCK_TABLE }}
          tf_version:            ${{ env.TF_VERSION }}
          go_version:            ${{ env.GO_VERSION }}
          provider_version:      ${{ env.PROVIDER_VERSION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-bg03-${{ inputs.action }}

      - name: Terraform Apply — ${{ inputs.action }}
        run: terraform apply -auto-approve tfplan
        # rollback: provider renames new prod → <orig>-new1, old blue → <orig>
        # delete-cluster-after-rollback: provider deletes <orig>-new1
        env:
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

      - name: Post-swap — promote restored cluster to read-write
        if: inputs.action == 'rollback'
        run: bash scripts/post_proxy_flip.sh
        # After name swap: old blue is now at original name (aurora_cluster_name).
        # Promote it to read-write so applications can resume writes.
        env:
          PROXY_ACTIVE:          old
          OLD_CLUSTER_ID:        ${{ inputs.aurora_cluster_name }}
          NEW_CLUSTER_ID:        ${{ inputs.aurora_cluster_name }}-new1
          AWS_REGION:            ${{ inputs.aws_region }}
          DB_SECRET_NAME:        ${{ needs.plan.outputs.db_secret_arn }}
          BASTION_INSTANCE_ID:   ${{ needs.plan.outputs.bastion_id }}

      - name: Summary
        run: |
          if [ "${{ inputs.action }}" = "rollback" ]; then
            OLD_NEW=$(terraform output -raw old_blue_cluster_id 2>/dev/null || echo "${{ inputs.aurora_cluster_name }}-new1")
            {
              echo "## Rollback Complete — Original Endpoint Restored"
              echo ""
              echo "| Item | Value |"
              echo "|------|-------|"
              echo "| Restored cluster | \`${{ inputs.aurora_cluster_name }}\` |"
              echo "| Cluster pending delete | \`$OLD_NEW\` |"
              echo ""
              echo "### Next Steps"
              echo "- Verify your application is working against the restored endpoint"
              echo "- When stable, run this workflow with **delete-cluster-after-rollback** to remove the -new1 cluster"
            } >> $GITHUB_STEP_SUMMARY
          else
            {
              echo "## -new1 Cluster Deleted"
              echo ""
              echo "Rollback is complete and the temporary cluster has been removed."
              echo ""
              echo "### Next Steps"
              echo "- Set \`enable_blue_green = false\` and run **aurora-deploy** to remove the B/G resource from state"
              echo "- Or keep \`enable_blue_green = true\` and run **bg-01-create-green** to start a new upgrade cycle"
            } >> $GITHUB_STEP_SUMMARY
          fi
