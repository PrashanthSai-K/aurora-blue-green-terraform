name: "Blue-Green | 3. Replication & Proxy Management"

# Three actions in one workflow:
#
#   enable-replication
#     Reads current proxy_active_cluster from state and sets up MySQL replication
#     in the correct direction — no terraform apply, no approval needed.
#       proxy_active_cluster=new  →  new prod → old blue  (rollback safety after switchover)
#       proxy_active_cluster=old  →  old blue → new prod  (re-promote safety after rollback)
#
#   rollback
#     Flips the RDS Proxy to the old cluster.
#     plan job  — shows what terraform will change (no approval)
#     apply job — pre-flight MySQL → terraform apply → promote old read-write
#                 → enable replication old→new (for zero-lag re-promote later)
#
#   repromote
#     Flips the RDS Proxy back to the new cluster.
#     plan job  — shows what terraform will change (no approval)
#     apply job — pre-flight MySQL → terraform apply → promote new read-write

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'enable-replication = set up replication | rollback = flip proxy to old | repromote = flip proxy to new'
        required: true
        default: 'enable-replication'
        type: choice
        options: [enable-replication, rollback, repromote]
      project_name:
        description: 'Must match the project_name used in aurora-deploy (e.g. aurora-github-8a1)'
        required: false
        default: 'aurora-github-8a1'
      aurora_cluster_name:
        description: 'Must match the aurora_cluster_name used in aurora-deploy (e.g. aurora-github-db)'
        required: false
        default: 'aurora-github-db'
      environment:
        description: 'Environment tag — must match the environment used in aurora-deploy'
        required: false
        default: 'aurora-test'
      tf_state_key:
        description: 'S3 state key — must match your environment'
        required: false
        default: 'aurora-github/terraform.tfstate'
      aws_region:
        description: 'AWS Region'
        required: false
        default: 'us-east-1'

env:
  TF_VERSION: "1.9.0"
  GO_VERSION: "1.21"
  PROVIDER_VERSION: "1.0.0"

# ── Job 1: Plan / Enable-Replication ─────────────────────────────────────────
# Always runs without approval.
# For enable-replication: reads state and runs replication setup directly — done.
# For rollback/repromote: reads state, runs terraform plan, uploads artifact.
jobs:
  plan:
    name: "Plan / Enable Replication"
    runs-on: ubuntu-latest
    outputs:
      old_cluster_id: ${{ steps.state.outputs.old_cluster_id }}
      bastion_id:     ${{ steps.state.outputs.bastion_id }}
      db_secret_arn:  ${{ steps.state.outputs.db_secret_arn }}
      proxy_active:   ${{ steps.state.outputs.proxy_active }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (AWS + provider build + terraform init)
        uses: ./.github/actions/tf-setup
        with:
          aws_access_key_id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region:            ${{ inputs.aws_region }}
          tf_state_bucket:       ${{ secrets.TF_STATE_BUCKET }}
          tf_state_key:          ${{ inputs.tf_state_key }}
          tf_state_lock_table:   ${{ secrets.TF_STATE_LOCK_TABLE }}
          tf_version:            ${{ env.TF_VERSION }}
          go_version:            ${{ env.GO_VERSION }}
          provider_version:      ${{ env.PROVIDER_VERSION }}

      - name: Write variable overrides
        run: |
          cat > /tmp/override.tfvars << EOF
          project_name        = "${{ inputs.project_name }}"
          aurora_cluster_name = "${{ inputs.aurora_cluster_name }}"
          environment         = "${{ inputs.environment }}"
          rds_proxy_name      = "${{ inputs.project_name }}-proxy"
          iam_role_name       = "${{ inputs.project_name }}-readonly-role"
          iam_policy_name     = "${{ inputs.project_name }}-readonly-policy"
          okta_app_name       = "${{ inputs.project_name }}-app"
          okta_group_name     = "${{ inputs.project_name }}-readonly-users"
          EOF

      - name: Read state
        id: state
        run: |
          OLD_ID=$(terraform output -raw old_blue_cluster_id 2>/dev/null || echo "")
          BASTION=$(terraform output -raw bastion_instance_id 2>/dev/null || echo "")
          PROXY_ACTIVE=$(terraform output -raw proxy_active_cluster 2>/dev/null || echo "new")

          if [ -z "$OLD_ID" ] || [ "$OLD_ID" = "null" ]; then
            echo "ERROR: old_blue_cluster_id not in state — run bg-02-switchover first."
            exit 1
          fi

          # db_secret_arn was added after initial deploy so it may not be in state yet.
          # Look it up directly via AWS CLI — faster and always current.
          DB_SECRET=$(aws secretsmanager list-secrets \
            --region "${{ inputs.aws_region }}" \
            --filters "Key=name,Values=${{ inputs.project_name }}-aurora-credentialss" \
            --query 'SecretList[0].ARN' \
            --output text 2>/dev/null || echo "")
          # Fallback to terraform output if the list-secrets call fails
          [ -z "$DB_SECRET" ] || [ "$DB_SECRET" = "None" ] && \
            DB_SECRET=$(terraform output -raw db_secret_arn 2>/dev/null || echo "")

          if [ -z "$DB_SECRET" ] || [ "$DB_SECRET" = "None" ]; then
            echo "ERROR: Could not resolve Secrets Manager ARN for ${{ inputs.project_name }}-aurora-credentialss"
            exit 1
          fi

          echo "old_cluster_id=$OLD_ID"     >> $GITHUB_OUTPUT
          echo "bastion_id=$BASTION"        >> $GITHUB_OUTPUT
          echo "db_secret_arn=$DB_SECRET"   >> $GITHUB_OUTPUT
          echo "proxy_active=$PROXY_ACTIVE" >> $GITHUB_OUTPUT
          echo "Old cluster  : $OLD_ID"
          echo "Bastion      : $BASTION"
          echo "Secret ARN   : $DB_SECRET"
          echo "Proxy active : $PROXY_ACTIVE"

      # ── enable-replication path ───────────────────────────────────────────
      - name: Enable replication in correct direction
        if: inputs.action == 'enable-replication'
        run: |
          PROXY_ACTIVE="${{ steps.state.outputs.proxy_active }}"
          if [ "$PROXY_ACTIVE" = "new" ]; then
            echo "Direction: new prod → old blue (rollback safety)"
          else
            echo "Direction: old blue → new prod (re-promote safety)"
          fi
          bash scripts/enable_replication.sh
        env:
          PROXY_ACTIVE:          ${{ steps.state.outputs.proxy_active }}
          OLD_CLUSTER_ID:        ${{ steps.state.outputs.old_cluster_id }}
          NEW_CLUSTER_ID:        ${{ inputs.aurora_cluster_name }}
          AWS_REGION:            ${{ inputs.aws_region }}
          DB_SECRET_NAME:        ${{ steps.state.outputs.db_secret_arn }}
          BASTION_INSTANCE_ID:   ${{ steps.state.outputs.bastion_id }}

      - name: Replication summary
        if: inputs.action == 'enable-replication'
        run: |
          DIRECTION="${{ steps.state.outputs.proxy_active == 'new' && 'new prod → old blue' || 'old blue → new prod' }}"
          {
            echo "## Replication Enabled"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Direction | \`$DIRECTION\` |"
            echo "| Old Cluster | \`${{ steps.state.outputs.old_cluster_id }}\` |"
          } >> $GITHUB_STEP_SUMMARY

      # ── rollback / repromote plan path ────────────────────────────────────
      - name: Terraform Plan — Rollback (proxy → old)
        if: inputs.action == 'rollback'
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -var-file="/tmp/override.tfvars" \
            -var="enable_blue_green=true" \
            -var="trigger_switchover=true" \
            -var="proxy_active_cluster=old" \
            -var="retain_old_cluster=true" \
            -var="old_blue_cluster_id=${{ steps.state.outputs.old_cluster_id }}" \
            -var="bastion_instance_id=${{ steps.state.outputs.bastion_id }}" \
            -out=tfplan \
            2>&1 | tee /tmp/plan-output.txt
        env:
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

      - name: Terraform Plan — Repromote (proxy → new)
        if: inputs.action == 'repromote'
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -var-file="/tmp/override.tfvars" \
            -var="enable_blue_green=true" \
            -var="trigger_switchover=true" \
            -var="proxy_active_cluster=new" \
            -var="retain_old_cluster=true" \
            -var="old_blue_cluster_id=${{ steps.state.outputs.old_cluster_id }}" \
            -var="bastion_instance_id=${{ steps.state.outputs.bastion_id }}" \
            -out=tfplan \
            2>&1 | tee /tmp/plan-output.txt
        env:
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

      - name: Plan summary
        if: inputs.action == 'rollback' || inputs.action == 'repromote'
        run: |
          LABEL="${{ inputs.action == 'rollback' && 'Rollback → Old Cluster' || 'Re-promote → New Cluster' }}"
          {
            echo "## Plan — $LABEL"
            echo "**Project:** \`${{ inputs.project_name }}\`  |  **Old cluster:** \`${{ steps.state.outputs.old_cluster_id }}\`"
            echo '```'
            tail -30 /tmp/plan-output.txt
            echo '```'
            echo "> Approve the **apply** job below to execute."
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload plan artifact
        if: inputs.action == 'rollback' || inputs.action == 'repromote'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-bg03-${{ inputs.action }}
          path: tfplan
          retention-days: 1

# ── Job 2: Apply (rollback / repromote only — requires approval) ──────────────
  apply:
    name: "Apply — ${{ inputs.action }}"
    needs: plan
    if: inputs.action == 'rollback' || inputs.action == 'repromote'
    runs-on: ubuntu-latest
    environment: aurora-test   # ← approval gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (AWS + provider build + terraform init)
        uses: ./.github/actions/tf-setup
        with:
          aws_access_key_id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region:            ${{ inputs.aws_region }}
          tf_state_bucket:       ${{ secrets.TF_STATE_BUCKET }}
          tf_state_key:          ${{ inputs.tf_state_key }}
          tf_state_lock_table:   ${{ secrets.TF_STATE_LOCK_TABLE }}
          tf_version:            ${{ env.TF_VERSION }}
          go_version:            ${{ env.GO_VERSION }}
          provider_version:      ${{ env.PROVIDER_VERSION }}

      - name: Pre-flip — set current cluster read-only, wait for replication lag = 0
        run: bash scripts/pre_proxy_flip.sh
        env:
          # PROXY_ACTIVE = destination (old for rollback, new for repromote)
          PROXY_ACTIVE:          ${{ inputs.action == 'rollback' && 'old' || 'new' }}
          OLD_CLUSTER_ID:        ${{ needs.plan.outputs.old_cluster_id }}
          NEW_CLUSTER_ID:        ${{ inputs.aurora_cluster_name }}
          AWS_REGION:            ${{ inputs.aws_region }}
          DB_SECRET_NAME:        ${{ needs.plan.outputs.db_secret_arn }}
          BASTION_INSTANCE_ID:   ${{ needs.plan.outputs.bastion_id }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-bg03-${{ inputs.action }}

      - name: Terraform Apply — flip proxy
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

      - name: Post-flip — promote active cluster to read-write
        run: bash scripts/post_proxy_flip.sh
        env:
          PROXY_ACTIVE:          ${{ inputs.action == 'rollback' && 'old' || 'new' }}
          OLD_CLUSTER_ID:        ${{ needs.plan.outputs.old_cluster_id }}
          NEW_CLUSTER_ID:        ${{ inputs.aurora_cluster_name }}
          AWS_REGION:            ${{ inputs.aws_region }}
          DB_SECRET_NAME:        ${{ needs.plan.outputs.db_secret_arn }}
          BASTION_INSTANCE_ID:   ${{ needs.plan.outputs.bastion_id }}

      - name: Enable replication in new direction (rollback only)
        if: inputs.action == 'rollback'
        run: bash scripts/enable_replication.sh
        # After rolling back to old, set up old→new replication so new prod
        # stays in sync — enables zero-lag repromote later.
        env:
          PROXY_ACTIVE:          old
          OLD_CLUSTER_ID:        ${{ needs.plan.outputs.old_cluster_id }}
          NEW_CLUSTER_ID:        ${{ inputs.aurora_cluster_name }}
          AWS_REGION:            ${{ inputs.aws_region }}
          DB_SECRET_NAME:        ${{ needs.plan.outputs.db_secret_arn }}
          BASTION_INSTANCE_ID:   ${{ needs.plan.outputs.bastion_id }}

      - name: Summary
        run: |
          if [ "${{ inputs.action }}" = "rollback" ]; then
            TITLE="Rollback Complete — Traffic on Old Cluster"
            NEXT="- Fix the issue on new cluster\n- Run this workflow with **repromote** when ready"
          else
            TITLE="Re-promote Complete — Traffic on New Cluster"
            NEXT="- Run this workflow with **enable-replication** to set up new→old replication\n- Run **bg-06** when ready to delete the old cluster"
          fi
          PROXY_NOW=$(terraform output -raw proxy_active_cluster 2>/dev/null || echo "${{ inputs.action == 'rollback' && 'old' || 'new' }}")
          {
            echo "## $TITLE"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Action | \`${{ inputs.action }}\` |"
            echo "| Proxy Target | \`$PROXY_NOW\` |"
            echo "| Old Cluster | \`${{ needs.plan.outputs.old_cluster_id }}\` |"
            echo ""
            echo "### Next Steps"
            echo -e "$NEXT"
          } >> $GITHUB_STEP_SUMMARY
